imisTitle=Willkommen beim IMIS!
imisInfo1=Hier finden Sie Zugang zu den IMIS-Anwendungen (u.a. GIS, Dokpool, Adressbuch, LADA).
imisInfo2=Für die erstmalige Anmeldung im IMIS ab dem 10.09.2025 müssen Sie ein neues Passwort setzen, falls Sie zuvor nicht bereits das neue Adressbuch genutzt haben (dann nutzen Sie das Adressbuch-Passwort). Klicken Sie hierzu bitte auf "Passwort vergessen" und folgen dem Dialog. Sie erhalten anschließend einen Link zum Setzen des Passworts per E-Mail zugeschickt (bitte überprüfen Sie auch Ihren Spam-Ordner). Sollte dabei etwas nicht funktionieren, wenden Sie sich bitte mit Nennung Ihrer IMIS-Kennung und Ihrer E-Mailadresse an die IMIS-Hotline.
imisInfo3=Das neue Passwort darf nicht Ihre IMIS-Kennung enthalten, muss mind. 9 Zeichen lang sein und mindestens einen Großbuchstaben, einen Kleinbuchstaben, eine Ziffer und ein Sonderzeichen enthalten.
imisInfo4=Nach dem Login können Sie im Adressbuch (dort unter "Profil" oben rechts) Ihre eigenen Kontaktdaten einsehen und ggf. aktualisieren.

