imisTitle=Willkommen beim IMIS-Adressbuch!
imisInfo1=Hier finden Sie die Kontaktdaten der an IMIS beteiligten Stellen und Nutzer*innen.
imisInfo2=Für die erstmalige Anmeldung am IMIS-Adressbuch müssen Sie ein neues Passwort setzen. Klicken Sie hierzu bitte auf "Passwort vergessen". Sie erhalten anschließend einen Link zum Setzen des Passworts per E-Mail zugeschickt (bitte überprüfen Sie auch Ihren Spam-Ordner). 
imisInfo3=Das neue Passwort darf nicht Ihr Benutzerkürzel enthalten, muss mind. 9 Zeichen lang sein und mindestens einen Großbuchstaben, einen Kleinbuchstaben, eine Ziffer und ein Sonderzeichen enthalten.
imisInfo4=Nach dem Login können Sie unter "Profil" (oben rechts) Ihre eigenen Kontaktdaten einsehen und ggf. aktualisieren.

