#Password reset
passwordResetSubject=Passwort zurücksetzen
passwordResetBody=Sehr geehrte IMIS-Nutzende,\n\nes wurde eine Änderung der Zugangsdaten für Ihren IMIS-Account angefordert. Wenn Sie diese Änderung beantragt haben, klicken Sie auf den unten stehenden Link.\n\n{0}\n\nDer Link ist {3} gültig.\n\nSollten Sie keine Änderung vollziehen wollen können Sie diese Nachricht ignorieren und an Ihrem Account wird nichts geändert.\n\nMit freundlichen Grüßen,\nIhr IMIS-Team
passwordResetBodyHtml=<p>Sehr geehrte IMIS-Nutzende,</p><p>es wurde eine Änderung der Zugangsdaten für Ihren IMIS-Account angefordert. Wenn Sie diese Änderung beantragt haben, klicken Sie auf den unten stehenden Link.</p><p><a href="{0}">Link zum Zurücksetzen von Zugangsdaten</a></p><p>Der Link ist {3} gültig.</p><p>Sollten Sie keine Änderung vollziehen wollen können Sie diese Nachricht ignorieren und an Ihrem Account wird nichts geändert.</p><p>Mit freundlichen Grüßen,<br />Ihr IMIS-Team</p>
