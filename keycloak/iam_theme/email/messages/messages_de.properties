passwordResetBody=Sehr geehrte Nutzende,\n\nes wurde eine Änderung des Passworts für Ihren Account angefordert. Wenn Sie diese Änderung beantragt haben, klicken Sie bitte auf den unten stehenden Link.\n\n{0}\n\nDer Link ist {3} gültig.\n\nSollten Sie keine Änderung vollziehen wollen, können Sie diese Nachricht ignorieren und an Ihrem Account wird nichts geändert.\n\nMit freundlichen Grüßen,\nIhr Support-Team
passwordResetBodyHtml=<p>Sehr geehrte Nutzende,</p><p>es wurde eine Änderung des Passworts für Ihren Account angefordert. Wenn Sie diese Änderung beantragt haben, klicken Sie bitte auf den unten stehenden Link.</p><p><a href="{0}">Link zum Zurücksetzen des Passworts</a></p><p>Der Link ist {3} gültig.</p><p>Sollten Sie keine Änderung vollziehen wollen, können Sie diese Nachricht ignorieren und an Ihrem Account wird nichts geändert.</p><p>Mit freundlichen Grüßen,<br />Ihr Support-Team</p>
