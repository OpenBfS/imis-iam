# Virtual Hosts
#
# Required modules: mod_log_config

# If you want to maintain multiple domains/hostnames on your
# machine you can setup VirtualHost containers for them. Most configurations
# use only name-based virtual hosts so the server doesn't need to worry about
# IP addresses. This is indicated by the asterisks in the directives below.
#
# Please see the documentation at
# <URL:http://httpd.apache.org/docs/2.4/vhosts/>
# for further details before you try to setup virtual hosts.
#
# You may use the command line option '-S' to verify your virtual host
# configuration.

ErrorLog /dev/stderr
CustomLog /dev/stdout combined

Listen ${PORT}
<VirtualHost *:${PORT}>
    ServerName ${PROTOCOLL}://${HOSTNAME}:${PORT}
    ServerAdmin webmaster@localhost

    AddOutputFilterByType DEFLATE application/json application/javascript
    UseCanonicalName on
    SSLProxyEngine On

    RedirectMatch 301 "^/$" "${CLIENT_PATH}"

    OIDCCryptoPassphrase "exec:/bin/bash -c 'head /dev/urandom | tr -dc A-Za-z0-9 | head -c 64'"
    OIDCProviderMetadataURL http://keycloak:8080/realms/imis3/.well-known/openid-configuration
    OIDCClientID iam-client
    OIDCClientSecret "${CLIENT_SECRET}"
    OIDCRedirectURI "${CLIENT_PATH}redirect_uri"
    OIDCRefreshAccessTokenBeforeExpiry 30 logout_on_error
    OIDCStateMaxNumberOfCookies 5 true

    <LocationMatch "^/(realms|resources)/">
        ProxyPassMatch "http://keycloak:8080"
        ProxyPassReverse "http://keycloak:8080"
    </LocationMatch>

    <LocationMatch "(${CLIENT_PATH}|/backend/)">
        AuthType openid-connect
        Require valid-user
    </LocationMatch>

    <Location "/backend/">
        OIDCUnAuthAction 401
        RequestHeader set Authorization "Bearer %{OIDC_access_token}e" env=OIDC_access_token
    </Location>

    # Pass requests to photon geocoder
    <Location /photon>
        ProxyPass ${PHOTON_URL}
        ProxyPassReverse ${PHOTON_URL}
    </Location>

    ProxyPass "/backend" "http://keycloak:8080"
    ProxyPassReverse "/backend" "http://keycloak:8080"

    ProxyPass "${CLIENT_PATH}" "http://localhost:8080${CLIENT_PATH}" upgrade=websocket
    ProxyPassReverse "${CLIENT_PATH}" "http://localhost:8080${CLIENT_PATH}"
</VirtualHost>
