services:
  mailhog:
    build:
      context: ./mailhog
    image: "iam_mailhog"
    ports:
      - ${MAILHOG_PORT}:8025
  ldap:
    build:
      context: ./ldap
    image: "iam_ldap"
  db:
    build:
      context: ./db
    image: "iam_db"
    ports:
      - ${DB_PORT}:5432
  keycloak:
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      - KC_HOSTNAME=http://${HOSTNAME}:${PORT}
      - KC_BOOTSTRAP_ADMIN_USERNAME
      - KC_BOOTSTRAP_ADMIN_PASSWORD
      - CLIENT_PATH=${CLIENT_PATH}
    env_file:
      - keycloak/.env
#    volumes:
#      - ./keycloak/data:/opt/keycloak/data/import
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - ${PORT}:80
    environment:
      - CLIENT_HOST=${CLIENT_HOST}
      - CLIENT_PATH=${CLIENT_PATH}
      - CLIENT_MODE=${CLIENT_MODE}
      - HOSTNAME
      - PORT
      - PHOTON_URL
