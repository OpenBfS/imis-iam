services:
  mailhog:
    build:
      context: ./mailhog
    image: "iam_mailhog"
    ports:
      - 48082:8025
      - 41025:1025
  ldap:
    build:
      context: ./ldap
    image: "iam_ldap"
  db:
    build:
      context: ./db
    image: "iam_db"
    ports:
      - 2345:5432
  keycloak:
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    depends_on:
      - db
      - ldap
      - mailhog
    ports:
      - ${PORT}:8080
    environment:
      - PROTOCOLL
      - KC_HOSTNAME=${PROTOCOLL}://${HOSTNAME}:${PORT}
      - SP_HOSTNAME=${HOSTNAME}
      - SP_PORT
    env_file:
      - keycloak/.env
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    depends_on:
      - keycloak
    ports:
      - ${SP_PORT}:80
    environment:
      - CLIENT_HOST=${CLIENT_HOST}
      - CLIENT_MODE=${CLIENT_MODE}
      - PROTOCOLL
      - SP_HOSTNAME=${HOSTNAME}
      - SP_PORT
      - HOSTNAME
      - PORT
      - PHOTON_URL
