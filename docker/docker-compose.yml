version: "3.5"
services:
  mailhog:
    container_name: "iam_mailhog"
    build:
      context: ./mailhog
    image: "iam_mailhog"
    networks:
      - imis3
    ports:
      - 48082:8025
      - 41025:1025
  ldap:
    container_name: "iam-ldap"
    build:
      context: ./ldap
    image: "iam_ldap"
    networks:
      - imis3
  db:
    container_name: "iam_db"
    build:
      context: ./db
    image: "iam_db"
    networks:
      - imis3
  keycloak:
    container_name: "iam-keycloak"
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    networks:
      - imis3
    depends_on:
      - db
      - ldap
      - mailhog
    volumes:
      - ./keycloak:/opt/src
      - ../keycloak/iam_theme:/opt/keycloak/themes/iam_theme
      - ../keycloak/iam_spi:/opt/iam_spi
    ports:
      - 48080:8080
      - 49990:9990
    environment:
      - IAM_NOTIFICATION_RECIPIENT=${NOTIFICATION_RECIPIENT}
      - IAM_MAIL_SCHEDULER_INTERVAL=${MAIL_SCHEDULER_INTERVAL}
      - IAM_ACCOUNT_INACITIVITY_WARNING_TIME=${ACCOUNT_INACITIVITY_WARNING_TIME}
      - IAM_ACCOUNT_EXPIRY_TIME=${ACCOUNT_EXPIRY_TIME}
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    networks:
      - imis3
    depends_on:
      - keycloak
    volumes:
      - ./client:/usr/local/iamdocker
      - ../client:/usr/local/iamclient
    ports:
      - 48081:80
networks:
  imis3:
    name: imis3
