services:
  keycloak:
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    ports:
      - ${ADMIN_PORT}:8080
    env_file:
      - keycloak/keycloak.env
      - shared.env
#    volumes:
#      - ./keycloak/data:/opt/keycloak/data/import
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - ${PORT}:${PORT}
    env_file:
      - shared.env
    environment:
      - PHOTON_URL
