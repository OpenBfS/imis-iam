services:
  mailhog:
    build:
      context: ./mailhog
    image: "iam_mailhog"
    ports:
      - ${MAILHOG_PORT}:8025
    profiles:
      - dev
  ldap:
    build:
      context: ./ldap
    image: "iam_ldap"
    profiles:
      - dev
  db:
    build:
      context: ./db
    image: "iam_db"
    ports:
      - ${DB_PORT}:5432
    profiles:
      - dev
  keycloak:
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    ports:
      - ${ADMIN_PORT}:8080
    environment:
      - PROTOCOLL
      - KC_HOSTNAME=${PROTOCOLL}://${HOSTNAME}:${PORT}
      - KC_HOSTNAME_ADMIN=${PROTOCOLL}://${HOSTNAME}:${ADMIN_PORT}
      - KC_BOOTSTRAP_ADMIN_USERNAME
      - KC_BOOTSTRAP_ADMIN_PASSWORD
      - KC_DB_URL=${KC_DB_URL}
      - CLIENT_PATH=${CLIENT_PATH}
    env_file:
      - keycloak/.env
#    volumes:
#      - ./keycloak/data:/opt/keycloak/data/import
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - ${PORT}:80
    environment:
      - CLIENT_HOST=${CLIENT_HOST}
      - CLIENT_PATH=${CLIENT_PATH}
      - CLIENT_MODE=${CLIENT_MODE}
      - PROTOCOLL
      - HOSTNAME
      - PORT
      - PHOTON_URL
