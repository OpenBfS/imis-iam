version: "3.5"
services:
  ldap:
    container_name: "iam_ldap"
    build:
      context: ./ldap
    image: "iam_ldap"
    networks:
      - imis3
  db:
    container_name: "iam_db"
    build:
      context: ./db
    image: "iam_db"
    networks:
      - imis3
  keycloak:
    container_name: "iam-keycloak"
    build:
      context: ../
      dockerfile: ./docker/keycloak/Dockerfile
    image: "iam_keycloak"
    networks:
      - imis3
    depends_on:
      - db
      - ldap
    volumes:
      - ./keycloak:/opt/src
      - ../keycloak/iam_theme:/opt/keycloak/themes/iam_theme
      - ../keycloak/iam_spi:/opt/iam_spi
    ports:
      - 48080:8080
      - 49990:9990
  client:
    build:
      context: ../
      dockerfile: ./docker/client/Dockerfile
    image: "iam_client"
    networks:
      - imis3
    depends_on:
      - keycloak
    volumes:
      - ./client:/usr/local/iamdocker
      - ../client:/usr/local/iamclient
    ports:
      - 48081:80
networks:
  imis3:
    name: imis3
