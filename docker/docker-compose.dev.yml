services:
  mailhog:
    build:
      context: ./mailhog
    image: "iam_mailhog"
    ports:
      - ${MAILHOG_PORT:-48082}:8025
  ldap:
    build:
      context: ./ldap
    image: "iam_ldap"
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: keycloak
    volumes:
      # create the schema 'keycloak'
      - ./db/initdb.d:/docker-entrypoint-initdb.d/
    ports:
      - ${DB_PORT:-2345}:5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U keycloak || exit 1"
        ]
      timeout: 5s
      start_period: 120s
      interval: 5s
      retries: 5
  keycloak:
    extends:
      file: docker-compose.yml
      service: keycloak
    entrypoint: /opt/src/start-dev.sh
    ports:
      - ${ADMIN_PORT:-48080}:8080
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_started
      mailhog:
        condition: service_started
    volumes:
      - ./keycloak:/opt/src
      - ../keycloak/iam_theme:/opt/keycloak/themes/iam_theme
      - ../keycloak/iam_spi:/opt/iam_spi
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=secret
      - KC_HOSTNAME_ADMIN=${PROTOCOLL}://${HOSTNAME}:${ADMIN_PORT:-48080}
      - KC_DB_URL=jdbc:postgresql://db/keycloak?currentSchema=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=secret
      - KC_SPI_THEME_STATIC_MAX_AGE=-1
      - KC_SPI_THEME_CACHE_THEMES=false
      - KC_SPI_THEME_CACHE_TEMPLATES=false
  client:
    build:
      dockerfile: ./docker/client/Dockerfile.dev
    extends:
      file: docker-compose.yml
      service: client
    entrypoint:
      - bash
      - /usr/local/iamdocker/start.sh
    environment:
      - CLIENT_MODE=development
      - SESSION_INACTIVITY_TIMEOUT=${SESSION_INACTIVITY_TIMEOUT}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
      #usually not required for dev:
      #- CA_BUNDLE_PATH=${CA_BUNDLE_PATH}
    volumes:
      - ./client:/usr/local/iamdocker
      - ../client:/usr/local/iamclient
