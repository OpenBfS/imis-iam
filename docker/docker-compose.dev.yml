services:
  mailhog:
    ports:
      - ${MAILHOG_PORT:-48082}:8025
  db:
    ports:
      - ${DB_PORT:-2345}:5432
  keycloak:
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_started
      mailhog:
        condition: service_started
    volumes:
      - ./keycloak:/opt/src
      - ../keycloak/iam_theme:/opt/keycloak/themes/iam_theme
      - ../keycloak/iam_spi:/opt/iam_spi
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=secret
      - KC_DB_URL=jdbc:postgresql://db/keycloak?currentSchema=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=secret
      - KC_SPI_THEME_STATIC_MAX_AGE=-1
      - KC_SPI_THEME_CACHE_THEMES=false
      - KC_SPI_THEME_CACHE_TEMPLATES=false
  client:
    environment:
      - CLIENT_MODE=development
    volumes:
      - ./client:/usr/local/iamdocker
      - ../client:/usr/local/iamclient
